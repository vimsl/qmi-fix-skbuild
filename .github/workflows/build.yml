name: Build qmi_fix_skb.ko

on:
  workflow_dispatch:
  push:
    paths:
      - 'qmi_fix_skb.c'
      - 'Makefile'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu make libelf-dev

      - name: Download kernel source and prepare config
        run: |
          wget -q "https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.6.94.tar.xz" -O linux-src.tar.xz
          tar -xf linux-src.tar.xz
          cd linux-6.6.94
          # жµ£иЈ®жХ§йПИвВђзБПењЫеО§зЉГоЗЖзіЭйНЩоБДжГОйРҐгД¶ƒБйНІж•Гзі™зТЗжИЭзєАйЧЗвВђйР®еЛѓвВђе§РгАН
          cat > .config << 'EOF'
          CONFIG_MODULES=y
          CONFIG_MODULE_UNLOAD=y
          CONFIG_MODULE_FORCE_UNLOAD=y
          CONFIG_KPROBES=y
          CONFIG_KALLSYMS=y
          CONFIG_KALLSYMS_ALL=y
          CONFIG_IKCONFIG=y
          CONFIG_IKCONFIG_PROC=y
          CONFIG_64BIT=y
          CONFIG_ARM64=y
          CONFIG_ARCH_MEDIATEK=y
          CONFIG_PCI=y
          CONFIG_NET=y
          CONFIG_INET=y
          CONFIG_NETFILTER=y
          CONFIG_SKBuff=y
          EOF
          make ARCH=arm64 olddefconfig
          make ARCH=arm64 modules_prepare

      - name: Compile kernel module
        run: |
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
               -C $(pwd)/linux-6.6.94 M=$(pwd) modules

      - name: Verify module
        run: |
          file qmi_fix_skb.ko
          modinfo qmi_fix_skb.ko

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qmi_fix_skb
          path: qmi_fix_skb.ko

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          files: qmi_fix_skb.ko
          overwrite: true
