name: Build qmi_fix_skb.ko

on:
  workflow_dispatch:
  push:
    paths:
      - 'package/**'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential flex bison gawk \
            gettext libncurses-dev libssl-dev \
            python3-distutils rsync unzip zlib1g-dev zstd file

      - name: Download and Extract ImmortalWrt SDK
        run: |
          SDK_URL="https://downloads.immortalwrt.org/releases/24.10.2/targets/mediatek/filogic/immortalwrt-sdk-24.10.2-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          curl -L --retry 3 --retry-delay 10 -o sdk.tar.zst "$SDK_URL"
          tar --zstd -xf sdk.tar.zst
          mv immortalwrt-sdk-* sdk

      - name: Copy Package and Enable in Config
        run: |
          cp -r package/qmi_fix_skb sdk/package/
          cd sdk
          make defconfig
          # Enable our kmod in the config
          echo "CONFIG_PACKAGE_kmod-qmi_fix_skb=m" >> .config
          make defconfig

      - name: Build Kernel Module
        run: |
          cd sdk
          make package/qmi_fix_skb/compile V=s 2>&1 | tail -100

      - name: Locate and Verify Module
        run: |
          KO_FILE=$(find sdk -name qmi_fix_skb.ko -type f | head -1)
          if [ -z "$KO_FILE" ]; then
            echo "ERROR: qmi_fix_skb.ko not found!"
            echo "Searching for any .ko files..."
            find sdk -name "*.ko" -type f 2>/dev/null | head -20 || true
            echo "Listing build_dir contents..."
            find sdk/build_dir -maxdepth 4 -type d 2>/dev/null | head -30 || true
            exit 1
          fi
          echo "Module found: $KO_FILE"
          cp "$KO_FILE" ./qmi_fix_skb.ko
          file qmi_fix_skb.ko
          modinfo qmi_fix_skb.ko || true
          echo "---"
          echo "Original vermagic:"
          strings qmi_fix_skb.ko | grep "vermagic"

      - name: Patch vermagic (6.6.93 -> 6.6.94)
        run: |
          python3 -c "
          with open('qmi_fix_skb.ko', 'rb') as f:
              data = f.read()
          old = b'vermagic=6.6.93'
          new = b'vermagic=6.6.94'
          count = data.count(old)
          print(f'Found {count} occurrence(s) of {old}')
          if count == 0:
              import re
              matches = list(re.finditer(rb'vermagic=.{5,40}', data))
              for m in matches:
                  print(f'Found vermagic: {m.group()}')
          data = data.replace(old, new)
          with open('qmi_fix_skb.ko', 'wb') as f:
              f.write(data)
          print('Patched vermagic 6.6.93 -> 6.6.94')
          "
          echo "---"
          echo "Patched vermagic:"
          strings qmi_fix_skb.ko | grep "vermagic"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: qmi_fix_skb
          path: qmi_fix_skb.ko
