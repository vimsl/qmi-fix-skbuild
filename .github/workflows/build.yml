name: Build qmi_fix_skb.ko

on:
  workflow_dispatch:
  push:
    paths:
      - 'qmi_fix_skb.c'
      - 'Makefile'
      - 'config-6.6.94.txt'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu make libelf-dev

      - name: Download kernel source and prepare config
        run: |
          wget -q 'https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.6.94.tar.xz' -O linux-src.tar.xz
          tar -xf linux-src.tar.xz
          cd linux-6.6.94
          cp ../config-6.6.94.txt .config
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare

      - name: Build Image to generate Module.symvers with vmlinux symbols
        run: |
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -j$(nproc) Image

      - name: Compile kernel module
        run: |
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
               -C linux-6.6.94 M=$GITHUB_WORKSPACE modules

      - name: Verify module
        run: |
          file qmi_fix_skb.ko
          modinfo qmi_fix_skb.ko

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qmi_fix_skb
          path: qmi_fix_skb.ko

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          files: qmi_fix_skb.ko
          overwrite: true