name: Build qmi_fix_skb.ko

on:
  workflow_dispatch:
  push:
    paths:
      - 'qmi_fix_skb.c'
      - 'Makefile'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download ImmortalWrt SDK
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq zstd
          SDK_URL="https://downloads.immortalwrt.org/snapshots/targets/mediatek/filogic/immortalwrt-sdk-mediatek-filogic_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          curl -L --retry 3 --retry-delay 10 -o sdk.tar.zst "$SDK_URL"
          tar --zstd -xf sdk.tar.zst
          mv immortalwrt-sdk-* sdk

      - name: Prepare SDK and kernel
        run: |
          TERM=dumb make -C sdk defconfig 2>&1 | tail -5
          KERNEL_DIR=sdk/build_dir/target-aarch64_cortex-a53_musl/linux-mediatek_filogic/linux-6.18.34
          if [ ! -d "$KERNEL_DIR" ]; then
            echo "KERNEL_DIR not found, listing build_dir..."
            find sdk/build_dir -maxdepth 3 -type d | sort | head -20
            exit 1
          fi
          echo "KERNEL_DIR=$KERNEL_DIR"
          head -3 "$KERNEL_DIR/Makefile"

      - name: Compile kernel module
        run: |
          KERNEL_DIR=sdk/build_dir/target-aarch64_cortex-a53_musl/linux-mediatek_filogic/linux-6.18.34
          TOOLCHAIN=$(ls -d sdk/staging_dir/toolchain-*/bin/)
          export PATH="$TOOLCHAIN:$PATH"
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-openwrt-linux-musl-
          echo "=== running make modules ==="
          make -C "$KERNEL_DIR" M=$GITHUB_WORKSPACE modules V=s

      - name: Show result
        run: |
          file qmi_fix_skb.ko
          modinfo qmi_fix_skb.ko

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qmi_fix_skb
          path: qmi_fix_skb.ko
