name: Build qmi_fix_skb.ko

on:
  workflow_dispatch:
  push:
    paths:
      - 'package/**'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential flex bison gawk \
            gettext libncurses-dev libssl-dev \
            python3-distutils rsync unzip zlib1g-dev zstd file

      - name: Download and Extract ImmortalWrt SDK
        run: |
          SDK_URL="https://downloads.immortalwrt.org/releases/24.10.2/targets/mediatek/filogic/immortalwrt-sdk-24.10.2-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          curl -L --retry 3 --retry-delay 10 -o sdk.tar.zst "$SDK_URL"
          tar --zstd -xf sdk.tar.zst
          mv immortalwrt-sdk-* sdk

      - name: Locate Kernel Source and Toolchain
        run: |
          echo "=== SDK top-level ==="
          ls sdk/
          echo "=== staging_dir ==="
          ls sdk/staging_dir/ 2>/dev/null || echo "no staging_dir"
          echo "=== build_dir ==="
          ls sdk/build_dir/ 2>/dev/null || echo "no build_dir"
          
          # Find kernel source
          KERNEL_DIR=$(find sdk/build_dir -maxdepth 6 -type d -name "linux-*" 2>/dev/null | head -1)
          echo "KERNEL_DIR=$KERNEL_DIR"
          if [ -z "$KERNEL_DIR" ]; then
            echo "ERROR: Cannot find kernel source directory"
            exit 1
          fi
          ls "$KERNEL_DIR/Makefile" && echo "Kernel Makefile OK"
          
          # Find toolchain
          TOOLCHAIN_DIR=$(find sdk/staging_dir -maxdepth 3 -type d -name "toolchain-*" 2>/dev/null | head -1)
          echo "TOOLCHAIN_DIR=$TOOLCHAIN_DIR"
          if [ -z "$TOOLCHAIN_DIR" ]; then
            echo "ERROR: Cannot find toolchain"
            exit 1
          fi
          
          # Check CROSS_COMPILE prefix
          CROSS_PREFIX=$(ls "$TOOLCHAIN_DIR/bin/" | grep -oP '.*(?=gcc$)' | head -1 || true)
          echo "CROSS_PREFIX=$CROSS_PREFIX"
          
          # Check kernel config
          echo "=== CONFIG_KPROBES ==="
          grep "CONFIG_KPROBES" "$KERNEL_DIR/.config" || echo "CONFIG_KPROBES NOT FOUND"
          grep "CONFIG_KALLSYMS" "$KERNEL_DIR/.config" || echo "CONFIG_KALLSYMS NOT FOUND"

          # Export for next steps
          echo "KERNEL_DIR=$KERNEL_DIR" >> $GITHUB_ENV
          echo "TOOLCHAIN_DIR=$TOOLCHAIN_DIR" >> $GITHUB_ENV

      - name: Compile Module Directly
        run: |
          SRC_DIR="package/qmi_fix_skb/src"
          export PATH="$TOOLCHAIN_DIR/bin:$PATH"

          echo "=== Source files ==="
          ls -la "$SRC_DIR/"

          echo "=== Building module ==="
          make -C "$KERNEL_DIR" \
            CROSS_COMPILE="aarch64-openwrt-linux-musl-" \
            ARCH="arm64" \
            M="$(realpath $SRC_DIR)" \
            modules V=1 2>&1 | tee build.log

          echo "=== Build log errors ==="
          grep -iE "error|warning|undefined" build.log | head -30 || echo "No errors"

          echo "=== Checking for .ko ==="
          find "$SRC_DIR" -name "*.ko" -type f
          if [ -f "$SRC_DIR/qmi_fix_skb.ko" ]; then
            cp "$SRC_DIR/qmi_fix_skb.ko" ./qmi_fix_skb.ko
            file qmi_fix_skb.ko
            strings qmi_fix_skb.ko | grep "vermagic"
          else
            echo "ERROR: qmi_fix_skb.ko not produced!"
            exit 1
          fi

      - name: Patch vermagic (6.6.93 -> 6.6.94)
        run: |
          python3 -c "
          with open('qmi_fix_skb.ko', 'rb') as f:
              data = f.read()
          old = b'vermagic=6.6.93'
          new = b'vermagic=6.6.94'
          count = data.count(old)
          print(f'Found {count} occurrence(s) of {old}')
          if count == 0:
              import re
              matches = list(re.finditer(rb'vermagic=.{5,40}', data))
              for m in matches:
                  print(f'Found vermagic: {m.group()}')
          data = data.replace(old, new)
          with open('qmi_fix_skb.ko', 'wb') as f:
              f.write(data)
          print('Patched vermagic 6.6.93 -> 6.6.94')
          "
          strings qmi_fix_skb.ko | grep "vermagic"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: qmi_fix_skb
          path: qmi_fix_skb.ko
