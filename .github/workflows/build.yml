name: Build qmi_fix_skb.ko

on:
  workflow_dispatch:
  push:
    paths:
      - 'qmi_fix_skb.c'
      - 'Makefile'
      - 'package/**'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq zstd

      - name: Download ImmortalWrt SDK
        run: |
          SDK_URL="https://downloads.immortalwrt.org/releases/24.10.0-rc1/targets/mediatek/filogic/immortalwrt-sdk-24.10.0-rc1-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          curl -L --retry 3 -o sdk.tar.zst "$SDK_URL"
          tar --zstd -xf sdk.tar.zst
          mv immortalwrt-sdk-* sdk

      - name: Prepare SDK
        run: cd sdk && TERM=dumb make defconfig || true

      - name: Copy and build
        run: |
          cp -r package/qmi_fix_skb sdk/package/
          cd sdk
          make package/qmi_fix_skb/compile V=s

      - name: Extract .ko from .ipk
        run: |
          IPK=$(find sdk/bin -name "kmod-qmi_fix_skb*.ipk" -type f | head -1)
          if [ -z "$IPK" ]; then
            echo "ERROR: .ipk not found"
            find sdk/bin -name "*.ipk" | head -5
            exit 1
          fi
          echo "Found: $IPK"
          mkdir -p /tmp/extract
          cd /tmp/extract
          tar -xzf "$GITHUB_WORKSPACE/$IPK" || tar -xf "$GITHUB_WORKSPACE/$IPK"
          KO=$(find . -name "qmi_fix_skb.ko" | head -1)
          if [ -z "$KO" ]; then
            echo "ERROR: .ko not found in .ipk"
            find . -type f | head -10
            exit 1
          fi
          cp "$KO" "$GITHUB_WORKSPACE/qmi_fix_skb.ko"
          cd "$GITHUB_WORKSPACE"
          echo "=== SUCCESS ==="
          file qmi_fix_skb.ko
          modinfo qmi_fix_skb.ko 2>&1 | head -5

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qmi_fix_skb
          path: qmi_fix_skb.ko
