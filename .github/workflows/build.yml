name: Build qmi_fix_skb.ko

on:
  workflow_dispatch:
  push:
    paths:
      - 'qmi_fix_skb.c'
      - 'Makefile'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu make libelf-dev

      - name: Download Linux kernel source
        run: |
          wget -q "https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.6.94.tar.xz" -O linux-src.tar.xz
          tar -xf linux-src.tar.xz
          cd linux-6.6.94
          make defconfig
          make modules_prepare

      - name: Compile kernel module
        run: |
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
               -C $(pwd)/linux-6.6.94 M=$(pwd) modules

      - name: Verify module
        run: |
          file qmi_fix_skb.ko
          modinfo qmi_fix_skb.ko

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qmi_fix_skb
          path: qmi_fix_skb.ko
