name: Build qmi_fix_skb.ko

on:
  workflow_dispatch:
  push:
    paths:
      - 'package/**'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential flex bison gawk \
            gettext libncurses-dev libssl-dev \
            python3-distutils rsync unzip zlib1g-dev zstd file

      - name: Download and Extract ImmortalWrt SDK
        run: |
          SDK_URL="https://downloads.immortalwrt.org/releases/24.10.2/targets/mediatek/filogic/immortalwrt-sdk-24.10.2-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          curl -L --retry 3 --retry-delay 10 -o sdk.tar.zst "$SDK_URL"
          tar --zstd -xf sdk.tar.zst
          mv immortalwrt-sdk-* sdk

      - name: Locate Kernel and Toolchain
        run: |
          KERNEL_DIR=$(find sdk/build_dir -maxdepth 6 -type d -name "linux-*" 2>/dev/null | head -1)
          echo "KERNEL_DIR=$KERNEL_DIR"
          ls "$KERNEL_DIR/Makefile" || { echo "ERROR: not a kernel tree"; exit 1; }

          TOOLCHAIN_DIR=$(find sdk/staging_dir -maxdepth 3 -type d -name "toolchain-*" 2>/dev/null | head -1)
          echo "TOOLCHAIN_DIR=$TOOLCHAIN_DIR"

          if ls "$TOOLCHAIN_DIR/bin/aarch64-openwrt-linux-musl-gcc" 2>/dev/null; then
            CROSS="aarch64-openwrt-linux-musl-"
          elif ls "$TOOLCHAIN_DIR/bin/aarch64-openwrt-linux-gcc" 2>/dev/null; then
            CROSS="aarch64-openwrt-linux-"
          else
            CROSS=$(ls "$TOOLCHAIN_DIR/bin/" | grep -oP '.*(?=gcc$)' | head -1)
          fi
          echo "CROSS_COMPILE=$CROSS"
          [ -n "$CROSS" ] || { echo "ERROR: cannot determine CROSS_COMPILE"; exit 1; }

          echo "=== Kernel config check ==="
          grep -E "CONFIG_KPROBES=|CONFIG_KALLSYMS=|CONFIG_MODULES=" "$KERNEL_DIR/.config"

          echo "KERNEL_DIR=$KERNEL_DIR" >> $GITHUB_ENV
          echo "TOOLCHAIN_DIR=$TOOLCHAIN_DIR" >> $GITHUB_ENV
          echo "CROSS_COMPILE=$CROSS" >> $GITHUB_ENV

      - name: Prepare Kernel
        run: |
          export PATH="$TOOLCHAIN_DIR/bin:$PATH"
          ls "$KERNEL_DIR/scripts/basic/fixdep" 2>/dev/null && echo "fixdep OK" || echo "fixdep MISSING"
          ls "$KERNEL_DIR/Module.symvers" 2>/dev/null && echo "symvers OK" || echo "symvers MISSING"
          echo "=== modules_prepare ==="
          make -C "$KERNEL_DIR" CROSS_COMPILE="$CROSS_COMPILE" ARCH="arm64" modules_prepare 2>&1 | tail -20

      - name: Compile Module
        run: |
          SRC_DIR="package/qmi_fix_skb/src"
          export PATH="$TOOLCHAIN_DIR/bin:$PATH"
          echo "=== Source ==="
          cat "$SRC_DIR/Makefile"
          head -10 "$SRC_DIR/qmi_fix_skb.c"
          echo "=== Compiling (V=1) ==="
          make -C "$KERNEL_DIR" CROSS_COMPILE="$CROSS_COMPILE" ARCH="arm64" \
            M="$(realpath "$SRC_DIR")" modules V=1 2>&1 | tee build.log
        continue-on-error: true

      - name: Analyze Build
        run: |
          echo "=== ERRORS ==="
          grep -inE "error:|Error |fatal:" build.log | head -50 || echo "(none)"
          echo "=== WARNINGS ==="
          grep -inE "warning:" build.log | head -30 || echo "(none)"
          echo "=== LAST 50 LINES ==="
          tail -50 build.log

          SRC_DIR="package/qmi_fix_skb/src"
          KO=$(find "$SRC_DIR" -name "*.ko" -type f 2>/dev/null | head -1)
          if [ -n "$KO" ]; then
            echo "FOUND: $KO"
            cp "$KO" ./qmi_fix_skb.ko
            file qmi_fix_skb.ko
            strings qmi_fix_skb.ko | grep "vermagic"
            echo "MODULE_OK=1" >> $GITHUB_ENV
          else
            echo "NOT FOUND"
            echo "MODULE_OK=0" >> $GITHUB_ENV
          fi

      - name: Patch vermagic
        if: env.MODULE_OK == '1'
        run: |
          python3 -c "
          with open('qmi_fix_skb.ko', 'rb') as f:
              data = f.read()
          old = b'vermagic=6.6.93'
          new = b'vermagic=6.6.94'
          count = data.count(old)
          print(f'Found {count} occurrence(s) of {old}')
          if count == 0:
              import re
              matches = list(re.finditer(rb'vermagic=.{5,40}', data))
              for m in matches:
                  print(f'Found vermagic: {m.group()}')
          data = data.replace(old, new)
          with open('qmi_fix_skb.ko', 'wb') as f:
              f.write(data)
          print('Patched.')
          "
          strings qmi_fix_skb.ko | grep "vermagic"

      - name: Upload Artifact
        if: env.MODULE_OK == '1'
        uses: actions/upload-artifact@v4
        with:
          name: qmi_fix_skb
          path: qmi_fix_skb.ko
