name: Build qmi_fix_skb.ko

on:
  workflow_dispatch:
  push:
    paths:
      - 'qmi_fix_skb.c'
      - 'Makefile'
      - 'package/**'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq zstd libelf-dev

      - name: Download ImmortalWrt SDK
        run: |
          SDK_URL="https://downloads.immortalwrt.org/releases/24.10.0-rc1/targets/mediatek/filogic/immortalwrt-sdk-24.10.0-rc1-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          curl -L --retry 3 --retry-delay 10 -o sdk.tar.zst "$SDK_URL"
          tar --zstd -xf sdk.tar.zst
          mv immortalwrt-sdk-* sdk

      - name: Prepare SDK
        run: |
          cd sdk
          make defconfig

      - name: Copy package source
        run: |
          cp -r package/qmi_fix_skb sdk/package/
          ls -la sdk/package/qmi_fix_skb/src/

      - name: Build kernel module
        run: |
          cd sdk
          make package/qmi_fix_skb/compile V=s || true
          
          # йҺөжғ§еҹҢзјӮж ¬зҳ§жөңС…еўҝ
          echo "=== Searching for qmi_fix_skb.ko ==="
          find build_dir -name "qmi_fix_skb.ko" -type f 2>/dev/null
          
          # жҝЎеӮӣзҒүеЁҢв„ғеЈҳйҚ’её®зҙқеҰ«вӮ¬йҸҢгғ§зҙӘз’ҮжҲһжЈ©и№Ү?          if [ ! -f "$(find build_dir -name 'qmi_fix_skb.ko' -type f 2>/dev/null | head -1)" ]; then
            echo "=== Checking compile log ==="
            cat logs/package/qmi_fix_skb/compile.txt 2>/dev/null | tail -50
            echo "=== Searching for errors ==="
            grep -iE "error|fatal|undefined" logs/package/qmi_fix_skb/compile.txt 2>/dev/null | head -20
          fi

      - name: Locate and copy .ko
        run: |
          KO_FILE=$(find sdk/build_dir -name "qmi_fix_skb.ko" -type f 2>/dev/null | head -1)
          if [ -n "$KO_FILE" ]; then
            cp "$KO_FILE" ./qmi_fix_skb.ko
            echo "=== Module info ==="
            file qmi_fix_skb.ko
            modinfo qmi_fix_skb.ko
          else
            echo "ERROR: qmi_fix_skb.ko not found!"
            echo "=== Last 50 lines of compile log ==="
            tail -50 sdk/logs/package/qmi_fix_skb/compile.txt 2>/dev/null
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: qmi_fix_skb
          path: qmi_fix_skb.ko
