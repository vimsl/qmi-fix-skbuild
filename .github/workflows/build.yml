name: Build qmi_fix_skb.ko

on:
  workflow_dispatch:
  push:
    paths:
      - 'qmi_fix_skb.c'
      - 'Makefile'
      - 'package/**'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq zstd kmod libelf-dev

      - name: Download ImmortalWrt SDK
        run: |
          SDK_URL="https://downloads.immortalwrt.org/releases/24.10.2/targets/mediatek/filogic/immortalwrt-sdk-24.10.2-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          curl -L --retry 3 --retry-delay 10 -o sdk.tar.zst "$SDK_URL"
          tar --zstd -xf sdk.tar.zst
          mv immortalwrt-sdk-* sdk

      - name: Copy package and compile
        run: |
          set -e
          cp -r package/qmi_fix_skb sdk/package/
          cd sdk
          make package/qmi_fix_skb/compile V=s 2>&1 | tee ../compile.log
        continue-on-error: true

      - name: Diagnose build (if failed)
        if: failure()
        run: |
          echo "=== Build errors ==="
          grep -inE "error:|Error |fatal:" compile.log 2>/dev/null | head -50 || echo "(none)"

      - name: Locate module
        run: |
          set -e
          KO_FILE=$(find sdk/build_dir -name "qmi_fix_skb.ko" -type f 2>/dev/null | head -1)
          if [ -n "$KO_FILE" ]; then
            cp "$KO_FILE" ./qmi_fix_skb.ko
            echo "Module copied: $KO_FILE"
            echo "=== file ==="
            file qmi_fix_skb.ko || true
            echo "=== modinfo ==="
            modinfo qmi_fix_skb.ko 2>&1 | head -10 || true
          else
            echo "ERROR: qmi_fix_skb.ko not found!"
            echo "=== searching build_dir ==="
            find sdk/build_dir -name "*.ko" -type f 2>/dev/null | head -20
            echo "=== searching sdk/bin ==="
            find sdk/bin -name "*.ko" -type f 2>/dev/null | head -20
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: qmi_fix_skb
          path: qmi_fix_skb.ko
