name: Build qmi_fix_skb.ko

on:
  workflow_dispatch:
  push:
    paths:
      - 'qmi_fix_skb.c'
      - 'Makefile'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download ImmortalWrt SDK
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq zstd
          SDK_URL="https://downloads.immortalwrt.org/snapshots/targets/mediatek/filogic/immortalwrt-sdk-mediatek-filogic_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          curl -L --retry 3 --retry-delay 10 -o sdk.tar.zst "$SDK_URL"
          tar --zstd -xf sdk.tar.zst
          mv immortalwrt-sdk-* sdk

      - name: Probe SDK structure
        run: |
          echo "=== SDK Makefile modules/kernel targets ==="
          grep -n 'modules\|^[a-z_-]*:' sdk/Makefile | head -20 || true
          echo "=== ls sdk/ ==="
          ls sdk/
          echo "=== ls sdk/build_dir/ ==="
          ls sdk/build_dir/ 2>/dev/null || echo "no build_dir"
          echo "=== ls sdk/staging_dir/ ==="
          ls sdk/staging_dir/ 2>/dev/null || echo "no staging_dir"

      - name: Compile kernel module
        run: |
          make -C sdk defconfig
          make -C sdk M=$GITHUB_WORKSPACE modules V=s

      - name: Show result
        run: |
          file qmi_fix_skb.ko
          modinfo qmi_fix_skb.ko

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qmi_fix_skb
          path: qmi_fix_skb.ko
