name: Build qmi_fix_skb.ko

on:
  workflow_dispatch:
  push:
    paths:
      - 'qmi_fix_skb.c'
      - 'Makefile'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download ImmortalWrt SDK
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq zstd
          SDK_URL="https://downloads.immortalwrt.org/snapshots/targets/mediatek/filogic/immortalwrt-sdk-mediatek-filogic_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          curl -L --retry 3 --retry-delay 10 -o sdk.tar.zst "$SDK_URL"
          tar --zstd -xf sdk.tar.zst
          mv immortalwrt-sdk-* sdk

      - name: Probe SDK structure
        run: |
          echo "=== ls sdk/build_dir/target-aarch64_cortex-a53_musl/ ==="
          ls sdk/build_dir/target-aarch64_cortex-a53_musl/
          echo "=== looking for kernel Makefile ==="
          find sdk/build_dir -maxdepth 3 -name "Makefile" -exec grep -l "VERSION\|PATCHLEVEL" {} \; 2>/dev/null | head -5
          echo "=== looking for linux dirs ==="
          find sdk/build_dir -maxdepth 2 -type d -name "linux-*" 2>/dev/null | head -5
          echo "=== ls staging_dir toolchain ==="
          ls sdk/staging_dir/toolchain-aarch64_cortex-a53_gcc-14.3.0_musl/bin/ | head -5

      - name: Compile kernel module
        run: |
          KERNEL_DIR=$(find sdk -maxdepth 5 -type f -name "Makefile" -exec grep -l "VERSION = \|PATCHLEVEL =" {} \; 2>/dev/null | head -1 | xargs dirname)
          if [ -z "$KERNEL_DIR" ]; then
            echo "ERROR: cannot find kernel source dir"
            find sdk -maxdepth 4 -type d | sort | head -40
            exit 1
          fi
          echo "KERNEL_DIR=$KERNEL_DIR"
          head -3 "$KERNEL_DIR/Makefile"
          TOOLCHAIN=$(ls -d sdk/staging_dir/toolchain-*/bin/)
          export PATH="$TOOLCHAIN:$PATH"
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-openwrt-linux-musl-
          echo "=== running make prepare ==="
          make -C "$KERNEL_DIR" prepare V=s 2>&1 | tail -20
          echo "=== running make modules ==="
          make -C "$KERNEL_DIR" M=$GITHUB_WORKSPACE modules V=s

      - name: Show result
        run: |
          file qmi_fix_skb.ko
          modinfo qmi_fix_skb.ko

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qmi_fix_skb
          path: qmi_fix_skb.ko
